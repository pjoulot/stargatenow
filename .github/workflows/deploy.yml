name: Deploy to server

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual runs from the Actions tab

# Never let two deploys overlap; cancel an in-progress one if a newer push lands.
concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=""
          for name in SSH_HOST SSH_USER SSH_KEY DEPLOY_PATH; do
            if [ -z "${!name}" ]; then missing="$missing $name"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required repository secret(s):$missing"
            echo "Set them under Settings > Secrets and variables > Actions (Repository secrets), then re-run."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Public keys are not secret: print the pubkey this SSH_KEY corresponds to,
          # so it can be matched against the server's authorized_keys. -P "" also
          # fails cleanly if the key is passphrase-protected (unusable in CI).
          echo "Public key derived from SSH_KEY secret (must be in the server's authorized_keys):"
          if ! ssh-keygen -y -P "" -f ~/.ssh/deploy_key; then
            echo "::error::Could not read SSH_KEY. It is malformed or passphrase-protected. Deploy keys must have NO passphrase (CI can't unlock them). Regenerate with: ssh-keygen -t ed25519 -N '' -f deploy_key"
            exit 1
          fi
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes -o BatchMode=yes -o PreferredAuthentications=publickey" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='_og.html' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
