<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{background:#0A1019;font-family:'Space Grotesk',system-ui,sans-serif;color:#EAF1F9;position:relative}
.amber{position:absolute;left:0;right:0;top:0;height:5px;background:linear-gradient(90deg,transparent,#FFB627,transparent);opacity:.95}
.glow{position:absolute;inset:0;background:radial-gradient(circle at 80% 50%,rgba(159,216,242,.18),rgba(59,130,196,.06) 42%,transparent 60%)}
.stars{position:absolute;inset:0;background-image:
  radial-gradient(1.6px 1.6px at 18% 26%,rgba(159,216,242,.55),transparent),
  radial-gradient(1.6px 1.6px at 62% 18%,rgba(255,255,255,.45),transparent),
  radial-gradient(1.6px 1.6px at 38% 72%,rgba(159,216,242,.4),transparent),
  radial-gradient(2.2px 2.2px at 88% 64%,rgba(159,216,242,.4),transparent),
  radial-gradient(1.4px 1.4px at 50% 44%,rgba(255,255,255,.3),transparent);opacity:.7}
.gate{position:absolute;right:-70px;top:50%;transform:translateY(-50%);width:580px;opacity:.5;filter:drop-shadow(0 0 16px rgba(159,216,242,.45))}
.wrap{position:absolute;left:88px;top:50%;transform:translateY(-50%);max-width:740px;z-index:2}
.eyebrow{display:flex;align-items:center;gap:13px;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.28em;font-size:20px;color:#9FD8F2;margin-bottom:28px}
.dot{width:11px;height:11px;border-radius:50%;background:#9FD8F2;box-shadow:0 0 14px #9FD8F2}
.wm{font-weight:700;font-size:100px;letter-spacing:-.025em;line-height:.96}
.wm b{color:#9FD8F2}
.wm .eu{display:block;font-weight:500;font-size:.32em;letter-spacing:.42em;color:#9FD8F2;margin-top:10px}
.tag{margin-top:28px;font-weight:500;font-size:42px;line-height:1.12;color:#AAB7C9;letter-spacing:-.01em}
.tag .hl{color:#9FD8F2}
.hash{margin-top:34px;display:inline-block;font-family:'Space Mono',monospace;font-size:27px;letter-spacing:.05em;color:#1A1303;background:#FFB627;padding:13px 24px;font-weight:700;box-shadow:0 0 40px -10px rgba(255,182,39,.6)}
</style></head>
<body>
<div class="amber"></div><div class="glow"></div><div class="stars"></div>
<img class="gate" src="gate.png" alt="" />
<div class="wrap">
  <div class="eyebrow"><span class="dot"></span>Fan Mobilization · Est. 2026</div>
  <div class="wm">STARGATE<b>NOW</b><span class="eu">EUROPE</span></div>
  <div class="tag">The fan offensive to <span class="hl">reopen the gate.</span></div>
  <div class="hash">#SaveStargate</div>
</div>
</body></html>
